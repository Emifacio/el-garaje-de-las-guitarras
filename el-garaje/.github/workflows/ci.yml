name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test-and-lighthouse:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: el-garaje/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: el-garaje

      - name: Run tests
        run: npm test
        working-directory: el-garaje

      - name: Lighthouse CI
        run: npm run lhci
        working-directory: el-garaje
